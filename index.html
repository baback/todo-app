<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CarMatch · Swipe for Cars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Header */
    .header {
      width: 100%;
      max-width: 420px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }
    .header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b6b, #ffa94d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .badge {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: #999;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Card area */
    .deck {
      flex: 1;
      width: 100%;
      max-width: 420px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }

    .card-container {
      width: 100%;
      height: 70vh;
      max-height: 600px;
      position: relative;
    }

    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: #1a1a2e;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
      cursor: grab;
      touch-action: none;
    }
    .card:active { cursor: grabbing; }

    .card .car-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .card .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 80px 20px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
    }
    .card .name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .card .name span {
      font-weight: 400;
      color: #aaa;
      font-size: 1.2rem;
    }
    .card .bio {
      font-size: 0.85rem;
      color: #ccc;
      margin-top: 6px;
      line-height: 1.4;
    }

    /* Swipe indicators */
    .card .stamp {
      position: absolute;
      top: 40px;
      font-size: 2.5rem;
      font-weight: 800;
      padding: 10px 20px;
      border: 4px solid;
      border-radius: 12px;
      opacity: 0;
      transform: rotate(-15deg);
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 2;
    }
    .card .stamp.nope {
      right: 20px;
      color: #ff4757;
      border-color: #ff4757;
    }
    .card .stamp.like {
      left: 20px;
      color: #2ed573;
      border-color: #2ed573;
    }

    /* No more cards */
    .empty-deck {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      color: #555;
      border-radius: 16px;
      background: #12121a;
      border: 2px dashed #2a2a3a;
    }
    .empty-deck .icon { font-size: 3rem; }
    .empty-deck p { font-size: 1rem; color: #666; }
    .empty-deck .sub { font-size: 0.8rem; color: #444; }

    /* Bottom buttons */
    .actions {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 40px;
      z-index: 10;
    }
    .actions button {
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .actions button:active { transform: scale(0.9); }
    .btn-nope {
      background: #2a1a1a;
      color: #ff4757;
    }
    .btn-nope:hover { background: #3a1a1a; }
    .btn-like {
      background: #1a2a1a;
      color: #2ed573;
    }
    .btn-like:hover { background: #1a3a1a; }

    /* Liked bar */
    .liked-section {
      width: 100%;
      max-width: 420px;
      padding: 0 16px 16px;
      z-index: 10;
    }
    .liked-toggle {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: #999;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .liked-toggle:hover {
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }
    .liked-grid {
      display: none;
      gap: 8px;
      margin-top: 8px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      max-height: 140px;
      overflow-y: auto;
    }
    .liked-grid.open { display: flex; flex-wrap: wrap; }
    .liked-grid .chip {
      background: rgba(45, 213, 122, 0.15);
      border: 1px solid rgba(45, 213, 122, 0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: #2ed573;
    }

    /* Counter badge on card */
    .card .counter {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #888;
      z-index: 2;
    }

    /* Loading */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CarMatch</h1>
    <span class="badge" id="counter-badge">0 liked</span>
  </div>

  <div class="deck" id="deck">
    <div class="card-container" id="card-container">
      <div class="loading-state" id="loading">Loading cars...</div>
    </div>
  </div>

  <div class="actions" id="actions" style="display:none">
    <button class="btn-nope" id="btn-nope">✕</button>
    <button class="btn-like" id="btn-like">♥</button>
  </div>

  <div class="liked-section">
    <button class="liked-toggle" id="liked-toggle">▼ Likes (<span id="liked-count">0</span>)</button>
    <div class="liked-grid" id="liked-grid"></div>
  </div>

  <script>
    // --- Config ---
    const API_BASE = 'https://data.sopranos.dev/v1/proj_n6cdkmuxl2kom0ovcrtbglbo/db';
    const API_KEY = 'eb_sk_27jusfgzsw8des8jpdqqeml5uztfokw11nz7h6j3';
    const CAR_TABLE = '/cars';

    const headers = {
      'Authorization': `Bearer ${API_KEY}`,
      'Content-Type': 'application/json',
    };

    // --- State ---
    let cards = [];
    let currentIndex = 0;
    let likedCars = JSON.parse(localStorage.getItem('carmatch_likes') || '[]');
    let isDragging = false;
    let startX = 0, startY = 0, currentX = 0, currentY = 0;
    let isAnimating = false;

    const container = document.getElementById('card-container');
    const loading = document.getElementById('loading');
    const actions = document.getElementById('actions');
    const likedToggle = document.getElementById('liked-toggle');
    const likedGrid = document.getElementById('liked-grid');
    const likedCount = document.getElementById('liked-count');
    const counterBadge = document.getElementById('counter-badge');

    // --- Helpers ---
    async function api(method, path, body) {
      const url = API_BASE + path;
      const opts = { method, headers };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      const text = await res.text();
      if (!text) return { data: null };
      const json = JSON.parse(text);
      if (json.error) throw new Error(json.error.message);
      return json;
    }

    function updateUI() {
      likedCount.textContent = likedCars.length;
      counterBadge.textContent = `${likedCars.length} liked`;
      renderLikedGrid();
    }

    function renderLikedGrid() {
      if (likedGrid.classList.contains('open')) {
        likedGrid.innerHTML = likedCars.map(c =>
          `<span class="chip">${c.make} ${c.model}</span>`
        ).join('');
      }
    }

    // --- Card rendering ---
    function buildCard(car, index) {
      const div = document.createElement('div');
      div.className = 'card';
      div.dataset.index = index;

      const remaining = cards.length - currentIndex;
      div.innerHTML = `
        <div class="stamp nope" id="stamp-nope">NOPE</div>
        <div class="stamp like" id="stamp-like">LIKE</div>
        <img class="car-img" src="${car.image_url}" alt="${car.make} ${car.model}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22600%22 height=%22800%22><rect fill=%22%23333%22 width=%22600%22 height=%22800%22/><text x=%22300%22 y=%22400%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2224%22>${encodeURIComponent(car.make + ' ' + car.model)}</text></svg>'">
        <div class="counter">${index + 1}/${cards.length}</div>
        <div class="overlay">
          <div class="name">${car.year} ${car.make} <span>${car.model}</span></div>
          <div class="bio">${car.bio || ''}</div>
        </div>
      `;

      // Stack cards slightly
      const offset = index - currentIndex;
      if (offset === 0) {
        div.style.zIndex = 10;
      } else if (offset < 3) {
        div.style.transform = `scale(${1 - offset * 0.05}) translateY(${offset * 8}px)`;
        div.style.zIndex = 10 - offset;
        div.style.pointerEvents = 'none';
      } else {
        div.style.display = 'none';
      }

      // Touch/mouse drag handlers (only for top card)
      if (offset === 0) {
        div.addEventListener('pointerdown', onPointerDown);
        div.addEventListener('pointermove', onPointerMove);
        div.addEventListener('pointerup', onPointerUp);
        div.addEventListener('pointercancel', onPointerUp);
      }

      return div;
    }

    // --- Drag logic ---
    const SWIPE_THRESHOLD = 80;

    function onPointerDown(e) {
      if (isAnimating) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      currentX = 0;
      currentY = 0;
      const card = e.currentTarget;
      card.style.transition = 'none';
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      currentX = e.clientX - startX;
      currentY = e.clientY - startY;
      const card = e.currentTarget;
      const rotate = Math.max(-25, Math.min(25, currentX * 0.1));
      card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg)`;

      // Show stamps
      const stampNope = card.querySelector('#stamp-nope');
      const stampLike = card.querySelector('#stamp-like');
      stampNope.style.opacity = currentX < -30 ? Math.min(1, Math.abs(currentX) / 150) : 0;
      stampLike.style.opacity = currentX > 30 ? Math.min(1, currentX / 150) : 0;
    }

    function onPointerUp(e) {
      if (!isDragging) return;
      isDragging = false;
      const card = e.currentTarget;

      if (Math.abs(currentX) > SWIPE_THRESHOLD) {
        const direction = currentX > 0 ? 'right' : 'left';
        const flyX = direction === 'right' ? 800 : -800;
        isAnimating = true;
        card.style.transition = 'transform 0.4s ease';
        card.style.transform = `translate(${flyX}px, ${currentY + 100}px) rotate(${direction === 'right' ? 25 : -25}deg)`;
        card.style.pointerEvents = 'none';

        setTimeout(() => {
          if (direction === 'right') likeCar();
          else skipCar();
          card.remove();
          isAnimating = false;
          renderCards();
        }, 400);
      } else {
        // Snap back
        card.style.transition = 'transform 0.3s ease';
        card.style.transform = '';
        const stampNope = card.querySelector('#stamp-nope');
        const stampLike = card.querySelector('#stamp-like');
        stampNope.style.opacity = 0;
        stampLike.style.opacity = 0;
      }
    }

    // --- Actions ---
    function likeCar() {
      const car = cards[currentIndex];
      if (!car) return;
      if (!likedCars.find(c => c.id === car.id)) {
        likedCars.push({ id: car.id, make: car.make, model: car.model });
        localStorage.setItem('carmatch_likes', JSON.stringify(likedCars));
      }
      currentIndex++;
      updateUI();
    }

    function skipCar() {
      currentIndex++;
      updateUI();
    }

    function renderCards() {
      container.innerHTML = '';
      actions.style.display = 'none';

      if (currentIndex >= cards.length) {
        container.innerHTML = `
          <div class="empty-deck">
            <div class="icon">🏎️</div>
            <p>You've seen every car</p>
            <div class="sub">You liked ${likedCars.length} cars</div>
          </div>
        `;
        actions.style.display = 'flex';
        // Disable buttons
        document.getElementById('btn-nope').style.opacity = '0.3';
        document.getElementById('btn-like').style.opacity = '0.3';
        return;
      }

      actions.style.display = 'flex';
      document.getElementById('btn-nope').style.opacity = '1';
      document.getElementById('btn-like').style.opacity = '1';

      // Render next few cards (stack effect)
      for (let i = currentIndex; i < Math.min(currentIndex + 3, cards.length); i++) {
        const cardEl = buildCard(cards[i], i);
        container.appendChild(cardEl);
      }
    }

    // --- Load data ---
    async function loadCars() {
      try {
        loading.textContent = 'Loading cars...';
        const res = await api('GET', CAR_TABLE + '?limit=50');
        cards = (res.data || []).sort(() => Math.random() - 0.5); // shuffle
        if (cards.length === 0) {
          loading.textContent = 'No cars in the stable!';
          return;
        }
        currentIndex = 0;
        renderCards();
        updateUI();
      } catch (e) {
        loading.textContent = 'Failed to load: ' + e.message;
      }
    }

    // --- Button handlers ---
    document.getElementById('btn-nope').addEventListener('click', () => {
      if (isAnimating || currentIndex >= cards.length) return;
      const topCard = container.querySelector('.card');
      if (!topCard) return;
      isAnimating = true;
      topCard.style.transition = 'transform 0.35s ease';
      topCard.style.transform = 'translate(-500px, 80px) rotate(-20deg)';
      topCard.style.pointerEvents = 'none';
      setTimeout(() => {
        skipCar();
        topCard.remove();
        isAnimating = false;
        renderCards();
      }, 350);
    });

    document.getElementById('btn-like').addEventListener('click', () => {
      if (isAnimating || currentIndex >= cards.length) return;
      const topCard = container.querySelector('.card');
      if (!topCard) return;
      isAnimating = true;
      topCard.style.transition = 'transform 0.35s ease';
      topCard.style.transform = 'translate(500px, 80px) rotate(20deg)';
      topCard.style.pointerEvents = 'none';
      setTimeout(() => {
        likeCar();
        topCard.remove();
        isAnimating = false;
        renderCards();
      }, 350);
    });

    likedToggle.addEventListener('click', () => {
      likedGrid.classList.toggle('open');
      renderLikedGrid();
    });

    // --- Boot ---
    loadCars();
  </script>
</body>
</html>
