<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App · EdgeBase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container {
      width: 100%;
      max-width: 540px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .add-form {
      display: flex;
      border-bottom: 1px solid #e2e8f0;
    }
    .add-form input {
      flex: 1;
      border: none;
      padding: 1rem 1rem;
      font-size: 0.95rem;
      outline: none;
      background: transparent;
    }
    .add-form button {
      border: none;
      background: #6366f1;
      color: #fff;
      font-weight: 600;
      padding: 0 1.25rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background .15s;
    }
    .add-form button:hover { background: #4f46e5; }
    .add-form button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #f1f5f9;
      transition: background .1s;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item:hover { background: #f8fafc; }

    .todo-item .checkbox {
      width: 20px; height: 20px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
      background: #fff;
    }
    .todo-item .checkbox.checked {
      background: #6366f1;
      border-color: #6366f1;
    }
    .todo-item .checkbox.checked::after {
      content: "✓";
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
    .todo-item .title {
      flex: 1;
      font-size: 0.95rem;
    }
    .todo-item .title.done {
      text-decoration: line-through;
      color: #94a3b8;
    }
    .todo-item .delete-btn {
      border: none;
      background: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all .15s;
      opacity: 0;
    }
    .todo-item:hover .delete-btn { opacity: 1; }
    .todo-item .delete-btn:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #94a3b8;
    }
    .empty-state p { margin-top: 0.5rem; font-size: 0.9rem; }

    .footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .footer a { color: #6366f1; text-decoration: none; }

    .status {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.8rem;
    }
    .status.error { color: #ef4444; }
    .status.loading { color: #6366f1; }

    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e2e8f0; }
      .card { background: #1e293b; }
      .add-form { border-color: #334155; }
      .add-form input { color: #e2e8f0; }
      .add-form input::placeholder { color: #64748b; }
      .todo-item { border-color: #1e293b; }
      .todo-item:hover { background: #162032; }
      .subtitle { color: #64748b; }
      .todo-item .title.done { color: #475569; }
      .todo-item .delete-btn { color: #475569; }
      .todo-item .delete-btn:hover { color: #ef4444; background: #2d1b1b; }
      .empty-state { color: #475569; }
      .footer { color: #475569; }
      .todo-item .checkbox { border-color: #475569; background: #1e293b; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <span>☑</span> Todos
    </h1>
    <p class="subtitle">Powered by EdgeBase &middot; SQLite at the edge</p>

    <div class="card">
      <div class="add-form">
        <input type="text" id="new-todo" placeholder="Add a new todo..." autofocus>
        <button id="add-btn">Add</button>
      </div>
      <div id="status" class="status"></div>
      <ul class="todo-list" id="todo-list"></ul>
    </div>

    <div class="footer">
      Data stored in <a href="https://sopranos.dev" target="_blank">EdgeBase</a> &middot;
      <a href="https://github.com/nousresearch/hermes" target="_blank">Built with Hermes</a>
    </div>
  </div>

  <script>
    // --- Config ---
    const API_BASE = 'https://data.sopranos.dev/v1/proj_n6cdkmuxl2kom0ovcrtbglbo/db';
    const API_KEY = 'eb_sk_27jusfgzsw8des8jpdqqeml5uztfokw11nz7h6j3';

    const headers = {
      'Authorization': `Bearer ${API_KEY}`,
      'Content-Type': 'application/json',
    };

    // --- DOM refs ---
    const listEl = document.getElementById('todo-list');
    const inputEl = document.getElementById('new-todo');
    const addBtn = document.getElementById('add-btn');
    const statusEl = document.getElementById('status');

    // --- Helpers ---
    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
      if (!msg) statusEl.className = 'status';
    }

    async function api(method, path, body) {
      const url = API_BASE + path;
      const opts = { method, headers };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      // DELETE etc may return empty body
      const text = await res.text();
      if (!text) return { data: null };
      const json = JSON.parse(text);
      if (json.error) throw new Error(json.error.message || 'API error');
      return json;
    }

    // --- Render ---
    function renderTodos(todos) {
      if (!todos.length) {
        listEl.innerHTML = `<div class="empty-state">
          <div style="font-size:2rem;margin-bottom:0.5rem;">📋</div>
          <p>No todos yet. Add one above!</p>
        </div>`;
        return;
      }
      listEl.innerHTML = todos.map(t => {
        const done = t.completed === true || t.completed === 'true';
        return `<li class="todo-item" data-id="${t.id}">
          <div class="checkbox ${done ? 'checked' : ''}" data-action="toggle"></div>
          <span class="title ${done ? 'done' : ''}">${escapeHtml(t.title)}</span>
          <button class="delete-btn" data-action="delete" title="Delete">✕</button>
        </li>`;
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Data ---
    async function loadTodos() {
      setStatus('Loading...', 'loading');
      try {
        const res = await api('GET', '/todos');
        // Sort: incomplete first, then by id (newest last)
        const todos = (res.data || []).sort((a, b) => {
          const aDone = a.completed === true || a.completed === 'true';
          const bDone = b.completed === true || b.completed === 'true';
          if (aDone !== bDone) return aDone ? 1 : -1;
          return (a.id || 0) - (b.id || 0);
        });
        renderTodos(todos);
        setStatus('');
      } catch (e) {
        setStatus('Failed to load: ' + e.message, 'error');
      }
    }

    async function addTodo() {
      const title = inputEl.value.trim();
      if (!title) return;
      addBtn.disabled = true;
      setStatus('Adding...', 'loading');
      try {
        await api('POST', '/todos', { title, completed: false });
        inputEl.value = '';
        await loadTodos();
      } catch (e) {
        setStatus('Failed to add: ' + e.message, 'error');
      }
      addBtn.disabled = false;
      inputEl.focus();
    }

    async function toggleTodo(id, currentCompleted) {
      const newVal = !(currentCompleted === true || currentCompleted === 'true');
      setStatus('Updating...', 'loading');
      try {
        await api('PATCH', `/todos/${id}`, { completed: newVal });
        await loadTodos();
      } catch (e) {
        setStatus('Failed to update: ' + e.message, 'error');
      }
    }

    async function deleteTodo(id) {
      setStatus('Deleting...', 'loading');
      try {
        await api('DELETE', `/todos/${id}`);
        await loadTodos();
      } catch (e) {
        setStatus('Failed to delete: ' + e.message, 'error');
      }
    }

    // --- Events ---
    addBtn.addEventListener('click', addTodo);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    listEl.addEventListener('click', async (e) => {
      const item = e.target.closest('.todo-item');
      if (!item) return;
      const id = parseInt(item.dataset.id);
      const action = e.target.dataset.action;

      if (action === 'toggle') {
        // Find current state from the DOM
        const isChecked = item.querySelector('.checkbox').classList.contains('checked');
        await toggleTodo(id, isChecked);
      } else if (action === 'delete') {
        await deleteTodo(id);
      }
    });

    // --- Boot ---
    loadTodos();
  </script>
</body>
</html>
